<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch Me If You Can!</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#f5f5f5;
    font-family:Arial,Helvetica,sans-serif;
    user-select:none;
}

h1{
    margin-top:40px;
    text-align:center;
    position:relative;
    z-index:3;
    color:white;
    text-shadow:0 2px 5px black;
}

#message{
    text-align:center;
    font-size:22px;
    margin-top:20px;
    position:relative;
    z-index:3;
    color:white;
    text-shadow:0 2px 5px black;
}


#button{
    position:absolute;
    padding:18px 35px;
    border:none;
    border-radius:12px;
    font-size:22px;
    color:white;
    cursor:pointer;
    z-index:2;

    transition:
        left .2s,
        top .2s,
        transform .2s,
        background-color .2s;
}


#memoryPhoto{

    position:fixed;

    width:100vw;
    height:100vh;

    object-fit:cover;

    left:0;
    top:0;

    display:none;

    z-index:1;

    opacity:0;

    transition:opacity 0.8s ease-in-out;
}


</style>

</head>


<body>


<h1>🎁 Catch the Present!</h1>

<div id="message"></div>


<img id="memoryPhoto">


<button id="button">
Catch me!
</button>



<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>



<script>


const requiredClicks = 22;


// Replace with your final link
const secretLink = "https://YOUR-LINK-HERE.com";



// 22 photos
const photos = [

"images/photo1.jpeg",
"images/photo2.jpeg",
"images/photo3.jpeg",
"images/photo4.jpeg",
"images/photo5.jpeg",
"images/photo6.jpeg",
"images/photo7.jpeg",
"images/photo8.jpeg",
"images/photo9.jpeg",
"images/photo10.jpeg",
"images/photo11.jpeg",
"images/photo12.jpeg",
"images/photo13.jpeg",
"images/photo14.jpeg",
"images/photo15.jpeg",
"images/photo16.jpeg",
"images/photo17.jpeg",
"images/photo18.jpeg",
"images/photo19.jpeg",
"images/photo20.jpeg",
"images/photo21.jpeg",
"images/photo22.jpeg"

];



const button=document.getElementById("button");

const message=document.getElementById("message");

const memoryPhoto=document.getElementById("memoryPhoto");



const texts=[

"Too slow 😜",
"Almost!",
"Missed me!",
"Keep going!",
"You can do better!",
"I'm over here!",
"Not yet!",
"So close!",
"Again!",
"Catch me!"

];



const colors=[

"#e63946",
"#4361ee",
"#f72585",
"#2a9d8f",
"#ff9f1c",
"#7209b7",
"#06d6a0",
"#ef476f",
"#118ab2"

];



let clicks=0;

let scale=1;



move();



button.addEventListener("click",()=>{


clicks++;



// CHANGE PHOTO ONLY ON CLICK

const photoIndex=clicks-1;



memoryPhoto.style.opacity=0;



setTimeout(()=>{


memoryPhoto.src=photos[photoIndex];

memoryPhoto.style.display="block";


setTimeout(()=>{

memoryPhoto.style.opacity=1;

},50);



},400);




// shrink button

if(clicks%4===0 && scale>0.55){

scale-=0.07;

button.style.transform=`scale(${scale})`;

}



// change button color

button.style.background=
colors[Math.floor(Math.random()*colors.length)];



// change button text

button.textContent=
texts[Math.floor(Math.random()*texts.length)];





if(clicks>=requiredClicks){


message.innerHTML="🎉 YOU DID IT!";



confetti({

particleCount:250,

spread:150

});



victorySound();



setTimeout(()=>{

window.location.href=secretLink;

},1800);



return;

}


// no countdown

message.innerHTML="";



move();



});







function move(){


let x,y;



if(Math.random()<0.25){



const currentX=parseFloat(button.style.left)||0;

const currentY=parseFloat(button.style.top)||0;



x=currentX<window.innerWidth/2 ?

window.innerWidth-button.offsetWidth-30 :

30;



y=currentY<window.innerHeight/2 ?

window.innerHeight-button.offsetHeight-30 :

100;



}

else{



x=Math.random()*
(window.innerWidth-button.offsetWidth);



y=80+Math.random()*
(window.innerHeight-button.offsetHeight-100);



}



button.style.left=x+"px";

button.style.top=y+"px";



}





function victorySound(){



const audio=
new(window.AudioContext||window.webkitAudioContext)();



const osc=audio.createOscillator();

const gain=audio.createGain();



osc.connect(gain);

gain.connect(audio.destination);



osc.type="triangle";

osc.frequency.value=700;



gain.gain.setValueAtTime(
0.2,
audio.currentTime
);



gain.gain.exponentialRampToValueAtTime(
0.0001,
audio.currentTime+0.8
);



osc.start();

osc.stop(audio.currentTime+0.8);



}





button.style.background=
colors[Math.floor(Math.random()*colors.length)];



</script>


</body>
</html>
